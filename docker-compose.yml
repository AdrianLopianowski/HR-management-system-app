services:
  postgres:
    image: postgres:16-alpine
    container_name: stafflou_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5435:5432"
    volumes:
      - hr_pg_data:/var/lib/postgresql/data

volumes:
  hr_pg_data:
