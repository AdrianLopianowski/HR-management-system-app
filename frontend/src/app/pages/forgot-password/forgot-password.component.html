<div
  class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8 font-sans"
>
  <div
    class="max-w-md w-full space-y-8 bg-white p-10 rounded-3xl shadow-xl border border-gray-100"
  >
    <div class="text-center">
      <div
        class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-2xl shadow-lg shadow-indigo-200 mx-auto cursor-pointer"
        routerLink="/"
      >
        W
      </div>
      <h2 class="mt-6 text-3xl font-extrabold text-gray-900">Odzyskaj hasło</h2>
      <p class="mt-2 text-sm text-gray-600">
        Podaj swój adres e-mail, a wyślemy Ci link do zresetowania hasła.
      </p>
    </div>

    <form class="mt-8 space-y-6" (submit)="$event.preventDefault()">
      <div>
        <label
          for="email-address"
          class="block text-sm font-medium text-gray-700"
          >Adres e-mail</label
        >
        <input
          id="email-address"
          name="email"
          type="email"
          autocomplete="email"
          required
          class="mt-1 appearance-none relative block w-full px-4 py-3 border border-gray-300 rounded-xl placeholder-gray-400 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-600 focus:border-transparent sm:text-sm transition-shadow"
          placeholder="jan@firma.pl"
        />
      </div>

      <div>
        <button
          type="submit"
          class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-600 transition-all shadow-md hover:-translate-y-0.5"
        >
          Wyślij link resetujący
        </button>
      </div>
    </form>

    <div
      class="mt-6 text-center text-sm text-gray-600 border-t border-gray-100 pt-6"
    >
      Przypomniałeś sobie hasło?
      <a
        routerLink="/login"
        class="font-bold text-indigo-600 hover:text-indigo-500 transition-colors cursor-pointer flex items-center justify-center mt-2 gap-1"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
          class="w-4 h-4"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"
          />
        </svg>
        Wróć do logowania
      </a>
    </div>
  </div>
</div>
