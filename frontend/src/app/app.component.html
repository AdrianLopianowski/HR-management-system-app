<div class="min-h-screen bg-gray-100 p-10 font-sans">
  <div
    class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-lg border border-gray-100"
  >
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-extrabold text-gray-800">Zespół 🚀</h1>
      <button
        class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors"
      >
        + Dodaj pracownika
      </button>
    </div>

    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-gray-50 text-gray-600 uppercase text-sm leading-normal">
            <th class="p-4 rounded-tl-lg font-semibold">ID</th>
            <th class="p-4 font-semibold">Imię i nazwisko</th>
            <th class="p-4 font-semibold">Email</th>
            <th class="p-4 rounded-tr-lg font-semibold">Rola</th>
          </tr>
        </thead>
        <tbody class="text-gray-700 text-sm">
          @for (user of users; track user.id) {
            <tr
              class="border-b border-gray-100 hover:bg-indigo-50 transition-colors"
            >
              <td class="p-4 font-bold text-indigo-500">#{{ user.id }}</td>
              <td class="p-4 font-semibold text-gray-800">{{ user.name }}</td>
              <td class="p-4">{{ user.email }}</td>
              <td class="p-4">
                <span
                  class="px-3 py-1 text-xs font-bold uppercase rounded-full"
                  [class.bg-purple-100]="user.role === 'ADMIN'"
                  [class.text-purple-800]="user.role === 'ADMIN'"
                  [class.bg-green-100]="user.role !== 'ADMIN'"
                  [class.text-green-800]="user.role !== 'ADMIN'"
                >
                  {{ user.role }}
                </span>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="4" class="p-8 text-center text-gray-400 italic">
                Brak pracowników. Uderz w endpoint /seed aby dodać testowego!
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
